use_default_settings: true

general:
  debug: false
  instance_name: "Odin Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json
  max_page: 0
  # Raise timeout slightly — some engines are slow but worth waiting for
  timeout_limit: 5.0
  max_request_timeout: 12.0

server:
  secret_key: "REGENERATE_ME_WITH_openssl_rand_hex_32"
  limiter: false
  public_instance: false
  image_proxy: true
  http_protocol_version: "1.1"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: false
  infinite_scroll: false
  center_alignment: false
  default_theme: simple

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    base_url: "https://{language}.wikipedia.org/"
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackexchange
    shortcut: so
    api_site: "stackoverflow"
    disabled: false

  - name: arch linux wiki
    engine: archlinux
    shortcut: al
    disabled: false

  # News category engines
  - name: bing news
    engine: bing_news
    shortcut: bng
    disabled: false

  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

  # IT / tech category engines
  - name: hackernews
    engine: hackernews
    shortcut: hn
    disabled: false

  - name: reddit
    engine: reddit
    shortcut: re
    disabled: false

outgoing:
  request_timeout: 5.0
  max_request_timeout: 12.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
