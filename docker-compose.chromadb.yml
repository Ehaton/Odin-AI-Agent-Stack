# ChromaDB — vector store for Obsidian vault RAG
#
# Deploy to: ai-stack-420 (close to Ollama for embedding speed)
# Place at: /opt/chromadb/docker-compose.yml
#
# Start: docker compose up -d
# API: http://localhost:8000
# Persistence: ./data volume bind-mounted

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # LAN-only by default; add Tailscale IP if needed
    volumes:
      - ./data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_TOKEN}
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=Authorization
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Before first start:
# 1. Create .env in /opt/chromadb/ with: CHROMA_TOKEN=<output of openssl rand -hex 32>
# 2. Add CHROMA_TOKEN to /opt/Odin/.env so Odin's tools can authenticate
