services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_MAX_LOADED_MODELS=1   # IMPORTANT: don't let it hog VRAM
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia

  whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: whisper
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "10300:10300"
    volumes:
      - whisper-data:/data
    command: >
      --model medium
      --language en
      --device cpu

  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: piper
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "10200:10200"
    volumes:
      - piper-data:/data
    command: >
      --voice en_US-lessac-high

  openwakeword:
    image: rhasspy/wyoming-openwakeword:latest
    container_name: wakeword
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "10400:10400"
    command: >
      --preload-model hey_odin
      --threshold 0.5

  comfyui:
    image: pytorch/pytorch:2.4.0-cuda12.4-cudnn9-runtime
    container_name: comfyui
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8188:8188"
    volumes:
      - comfyui-models:/app/ComfyUI/models
      - comfyui-output:/app/ComfyUI/output
      - comfyui-custom-nodes:/app/ComfyUI/custom_nodes
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    entrypoint: bash
    command: >
      -c "
      if [ ! -f /opt/ComfyUI/main.py ]; then
        apt-get update -qq && apt-get install -y -qq git &&
        git clone --depth 1 https://github.com/comfyanonymous/ComfyUI /opt/ComfyUI &&
        pip install -q -r /opt/ComfyUI/requirements.txt;
      fi &&
      ln -sfn /app/ComfyUI/models /opt/ComfyUI/models &&
      ln -sfn /app/ComfyUI/output /opt/ComfyUI/output &&
      ln -sfn /app/ComfyUI/custom_nodes /opt/ComfyUI/custom_nodes &&
      python /opt/ComfyUI/main.py --listen 0.0.0.0 --port 8188
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8080:8080"
    volumes:
      - /opt/Odin/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://192.168.1.111:8080/
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "5680:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - NODE_ENV=production
      - GENERIC_TIMEZONE=America/Denver
      - TZ=America/Denver
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama-data:
  whisper-data:
  piper-data:
  searxng-data:
  chromadb-data:
  comfyui-models:
    name: odin_comfyui-models
    external: true
  comfyui-output:
    name: odin_comfyui-output
    external: true
  comfyui-custom-nodes:
    name: odin_comfyui-custom-nodes
    external: true
  odin-db:
  odin-logs:
  odin-images:
  n8n_data:

networks:
  ai-net:
