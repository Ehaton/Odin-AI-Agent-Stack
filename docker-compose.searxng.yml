# SearXNG — self-hosted metasearch aggregator for Odin
#
# Deploy to: any BeanLab host (recommend StorageBean or KidneyBean, NOT ai-stack-420).
# Place this file at: /opt/searxng/docker-compose.yml
# Also copy searxng-settings.yml alongside as: /opt/searxng/searxng/settings.yml
#
# Start with: docker compose up -d
# Access:     http://<host-ip>:8080
# Odin calls: http://<host-ip>:8080/search?q=QUERY&format=json

services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
