# ============================================================================
# Odin Model Registry — BeanLab May 2026
# ============================================================================
# Edit this file to swap models or tune routing without touching Odin.py.
# Changes take effect on next startup, or POST /api/models/reload to hot-swap.
#
# System prompts live in Odins_Self/prompts/v3/*.md — edit those directly.
# No Modelfile rebuilds needed; prompts are injected at runtime.
# ============================================================================

# ── Routing thresholds ───────────────────────────────────────────────────────
routing:
  voice_max_words:        12    # queries under this word count qualify for voice routing
  simple_infra_max_words: 15    # short infra checks route to the fast local model
  complex_host_threshold:  3    # 3+ host mentions → escalate to worker
  complex_word_threshold:  60   # long queries → escalate to worker

# ── Role → model mapping ─────────────────────────────────────────────────────
# These are the roles the classifier assigns. Edit the model tag to swap.
roles:
  worker: qwen3-coder:30b    # complex reasoning, multi-host coordination
  coder:  qwen3-coder:30b    # code generation, script writing, SSH tool chains
  voice:  llama3.2:3b        # HA commands, voice queries, trivial chat
  vision: qwen3-coder:30b    # image analysis (falls back to coder)

# ── Category → role mapping ──────────────────────────────────────────────────
categories:
  code:         coder
  infra_simple: coder
  infra:        worker
  reasoning:    worker
  home:         worker
  voice:        voice
  vision:       vision
  trivial:      voice
  general:      worker

# ── Model definitions ────────────────────────────────────────────────────────
# Each model tag must match exactly what `ollama list` shows.
# provider: anthropic routes to the Anthropic API instead of Ollama.

models:
  # ── Primary workhorse ───────────────────────────────────────────────────
  qwen3-coder:30b:
    label: "Qwen3 Coder 30B"
    description: >
      MoE architecture: 30B total parameters, ~3.3B active per token.
      Runs at 3B speed with 14B+ quality. Primary model for all tool-using
      tasks: SSH, vault, web search, Home Assistant, code generation.
    supports_tools:   true
    supports_vision:  false
    disable_thinking: true      # suppress <think> tokens for speed
    num_ctx:          8192
    temperature:      0.6
    prewarm:          true
    keep_alive:       10m
    role_hints:       [coder, worker, infra, reasoning]
    timeout:          180

  # ── Voice / lightweight ──────────────────────────────────────────────────
  llama3.2:3b:
    label: "Llama 3.2 3B"
    description: >
      Meta's native tool-calling 3B model. Fast cold-start (~2.5s),
      minimal VRAM. Used for voice commands, HA intents, and trivial chat.
      Keep-alive set to -1 (always warm) for sub-2s voice response.
    supports_tools:   true
    supports_vision:  false
    disable_thinking: false
    num_ctx:          4096
    temperature:      0.5
    prewarm:          true
    keep_alive:       "-1"      # always warm — critical for voice latency
    role_hints:       [voice, trivial]
    timeout:          60

  # ── Embeddings ───────────────────────────────────────────────────────────
  nomic-embed-text:
    label: "Nomic Embed Text"
    description: >
      Text embedding model for vault semantic search via ChromaDB.
      Not used for chat — only called by the vault_search tool.
    supports_tools:   false
    supports_vision:  false
    disable_thinking: false
    num_ctx:          2048
    temperature:      0.0
    prewarm:          false
    keep_alive:       5m
    role_hints:       [embed]
    timeout:          30

  # ── Claude Sonnet 4.6 (cloud reasoner) ─────────────────────────────────
  claude-sonnet:
    label: "Claude Sonnet 4.6"
    description: >
      Anthropic cloud model. Superior reasoning, writing, and synthesis.
      No tool calls — Claude in this role is pure text reasoning. All SSH,
      HA, vault, and web search tool calls stay on local qwen3-coder.
      Requires ANTHROPIC_API_KEY in .env. Tier 2: 1K req/min, no rate limit
      concerns at single-user homelab scale.
    supports_tools:   false     # tools always stay local
    supports_vision:  false
    disable_thinking: false
    num_ctx:          200000    # Claude's full context window
    temperature:      0.7
    prewarm:          false     # cloud model, no GPU prewarming
    keep_alive:       null
    role_hints:       [cloud, reasoning, writing, analysis]
    timeout:          60
    provider:         anthropic
    api_model:        claude-sonnet-4-6-20250514