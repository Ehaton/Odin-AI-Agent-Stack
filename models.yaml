# ============================================================================
# Odin Model Registry — BeanLab May 2026
# ============================================================================
# Edit this file to swap models or tune routing without touching Odin.py.
# Changes take effect on next startup, or POST /api/models/reload to hot-swap.
#
# System prompts live in Odins_Self/prompts/v3/*.md — edit those directly.
# No Modelfile rebuilds needed; prompts are injected at runtime.
# ============================================================================

# ─── Active role assignments ────────────────────────────────────────────────
roles:
  worker: qwen3-coder:30b              # Reasoning, synthesis, complex infra, vision-fallback
  coder: qwen3-coder:30b        # MoE code agent. 30B total, 3.3B active. Primary workhorse.
  voice: llama3.2:3b            # HA voice control — Meta's native tool calling
  vision: qwen3-coder:30b              # Vision tasks (fallback — upgrade when VL model fits)
  # Legacy aliases — all resolve to valid tags
  router: qwen3:8b
  reasoning: qwen3:8b
  general: qwen3:8b
  code: qwen3-coder:30b

# ─── Routing thresholds ─────────────────────────────────────────────────────
routing:
  complex_host_threshold: 2     # Host mentions that escalate coder→worker
  complex_word_threshold: 30    # Word count that escalates code queries to worker
  voice_max_words: 15           # Max words for HA voice routing
  simple_infra_max_words: 15    # Max words for single-host infra on coder

# ─── Default vision model ───────────────────────────────────────────────────
default_vision_model: qwen3-coder:30b

# ─── Model catalog ──────────────────────────────────────────────────────────
models:
  # ─── Auto (smart routing) ────────────────────────────────────────────────
  auto:
    label: "Auto"
    description: "Let Odin choose the best model based on your query."
    supports_tools: true
    supports_vision: false
    disable_thinking: false
    num_ctx: 8192
    temperature: 0.7
    top_p: 0.9
    prewarm: false
    role_hints: [auto]

  # ─── Primary: Qwen3-Coder 30B-A3B (MoE) — Coder ─────────────────────────
  # 30B total params, 3.3B active per token. Runs at 3B speed, 14B+ quality.
  # Purpose-built for agentic coding with native tool calling.
  # Non-thinking mode only (no <think> blocks).
  # VRAM: ~17 GB at Q4_K_M. Primary hot model.
  qwen3-coder:30b:
    label: "Qwen3 Coder 30B"
    description: "MoE coding agent. 30B total, 3.3B active per token. Fast inference with 14B+ code quality. Native tool calling, non-thinking."
    supports_tools: true
    supports_vision: false
    disable_thinking: true       # MoE coder is non-thinking by design
    num_ctx: 8192                # Conservative — leaves VRAM for KV cache
    temperature: 0.3
    top_p: 0.8
    prewarm: true
    role_hints: [coder, code, fast, tools]
    timeout: 60

  # ─── Reasoner: Qwen3 8B — Worker ─────────────────────────────────────────
  # Dense 8B model. Strong reasoning, synthesis, planning.
  # Swaps in when coder isn't needed. ~4.6 GB at Q4_K_M.
  qwen3:8b:
    label: "Qwen3 8B"
    description: "Dense 8B reasoner. Complex analysis, multi-host coordination, synthesis, planning."
    supports_tools: true
    supports_vision: false
    disable_thinking: false
    num_ctx: 8192
    temperature: 0.7
    top_p: 0.9
    prewarm: false               # Load on demand — coder is the primary hot model
    role_hints: [worker, reasoning, vision]
    timeout: 90

  # ─── Voice: Llama 3.2 3B ─────────────────────────────────────────────────
  llama3.2:3b:
    label: "Llama 3.2 3B"
    description: "Voice and HA control. Meta's native on-device tool calling. Sub-second responses."
    supports_tools: true
    supports_vision: false
    disable_thinking: false
    num_ctx: 4096
    temperature: 0.5
    top_p: 0.9
    prewarm: false
    role_hints: [voice, chat]
    timeout: 30

# ─── Category-to-role mapping ───────────────────────────────────────────────
categories:
  voice: voice           # HA commands
  trivial: voice         # Greetings, one-liners
  code: coder            # Code generation/debugging
  infra_simple: coder    # Short single-host infra queries
  home: worker           # Non-HA home planning
  infra: worker          # Complex multi-host coordination
  reasoning: worker      # Analysis, synthesis, planning
  general: worker        # Safe fallback

# ─── n8n integration ────────────────────────────────────────────────────────
n8n:
  enabled: true
  webhook_base_url: "http://192.168.1.219:5678"
  workflows:
    morning_flow: "/webhook/morning-flow"
    homelab_scan: "/webhook/homelab-scan"
    weekly_backup: "/webhook/weekly-backup"
    weekly_updates: "/webhook/weekly-updates"
    media_scan: "/webhook/media-duplicate-scan"
    jellybean_check: "/webhook/jellybean-accessibility"
