# ============================================================================
# Odin Model Registry — BeanLab May 2026
# ============================================================================

routing:
  voice_max_words:        12
  simple_infra_max_words: 15
  complex_host_threshold:  3
  complex_word_threshold:  60

roles:
  worker:  qwen3.6:35b-a3b
  coder:   qwen3-coder:30b
  voice:   llama3.2:3b
  vision:  qwen3-coder:30b

categories:
  code:         coder
  infra_simple: coder
  infra:        coder
  reasoning:    worker
  home:         worker
  voice:        voice
  vision:       vision
  trivial:      voice
  general:      worker

models:

  qwen3-coder:30b:
    label: "Qwen3 Coder 30B"
    description: >
      MoE: 30B total, ~3.3B active. Primary tool-calling model for all
      SSH, code generation, infra tasks, and HA service calls.
    supports_tools:   true
    supports_vision:  false
    disable_thinking: true
    num_ctx:          16384
    temperature:      0.3
    prewarm:          true
    keep_alive:       10m
    role_hints:       [coder, infra, tools]
    timeout:          180

  qwen3.6:35b-a3b:
    label: "Qwen3.6 35B"
    description: >
      MoE: 35B total, ~3B active. Conversational reasoning, planning,
      and synthesis. Swaps in for general/reasoning categories.
    supports_tools:   true
    supports_vision:  false
    disable_thinking: false
    num_ctx:          32768
    temperature:      0.8
    prewarm:          false
    keep_alive:       10m
    role_hints:       [worker, reasoning, general, conversation]
    timeout:          360

  llama3.2:3b:
    label: "Llama 3.2 3B"
    description: Always-warm voice model. Sub-2s HA intent routing.
    supports_tools:   true
    supports_vision:  false
    disable_thinking: false
    num_ctx:          4096
    temperature:      0.5
    prewarm:          true
    keep_alive:       "-1"
    role_hints:       [voice, trivial]
    timeout:          60

  nomic-embed-text:
    label: "Nomic Embed Text"
    description: Vault semantic search via ChromaDB. Not used for chat.
    supports_tools:   false
    supports_vision:  false
    disable_thinking: false
    num_ctx:          2048
    temperature:      0.0
    prewarm:          false
    keep_alive:       5m
    role_hints:       [embed]
    timeout:          30

  claude-sonnet:
    label: "Claude Sonnet 4.6"
    description: >
      Anthropic cloud. Architecture design, cross-file reasoning,
      long-form writing. No tools — pure text reasoning only.
    supports_tools:   false
    supports_vision:  false
    disable_thinking: false
    num_ctx:          200000
    temperature:      0.7
    prewarm:          false
    keep_alive:       null
    role_hints:       [cloud, reasoning, writing, analysis]
    timeout:          60
    provider:         anthropic
    api_model:        claude-sonnet-4-6
